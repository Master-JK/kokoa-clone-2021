<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Chats</title>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__Column">
            <span>No service</span>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="status-bar__Column">
            <span>17:43</span>
        </div>
        <div class="status-bar__Column">
            <span>100%</span>
            <i class="fas fa-battery-three-quarters"></i>
            <i class="fas fa-bolt"></i>
        </div>
    </div>
    <div class="Main-Setting">
        <span class="Main-Setting__title">Chats</span>
        <div class="Main-Setting__icon">
            <i class="fas fa-search fa-lg"></i>
            <i class="far fa-comment fa-lg"></i>
            <i class="fas fa-music fa-lg"></i>
            <a href="Setting.html"><i class="fas fa-cog fa-lg"></i></a>
        </div>
    </div>
    
    <div class="Person">
        <div class="Person__columns">
            <img src="kcm.jpg" / class="Person__img">
            <div class="Person__columns__text">
                <h6 class="Person__name">KMC-My Boy</h6>
                <span> Ma boy information</span>
            </div>
        </div>
        <div class="Person__columns_chats">
            <span class="Person__time">21:22</span>
            <span class="Person__number">1</span>
        </div>
    </div>

    <nav class="Navigation">
        <div class="Navigation__columns">
            <a href="friends.html"><i class="fas fa-user fa-2x"></i></a>
        </div>
        <div class="Navigation__columns">
            <a href="Chats.html"><i class="far fa-comment fa-2x"></i></a>
            <span>1</span>
        </div>
        <div class="Navigation__columns">
            <a href="Find.html"><i class="fas fa-search fa-lg fa-2x"></i></a>
        </div>
        <div class="Navigation__columns">
            <a href="More.html"><i class="fas fa-ellipsis-h fa-2x"></i></a>
            <span></span>
        </div>
    </nav>  



    <script src="https://kit.fontawesome.com/6478f529f2.js"
    crossorigin="anonymous"></script>
</body>
</html>
