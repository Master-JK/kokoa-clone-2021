<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>index</title>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__Column">
            <span>No service</span>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="status-bar__Column">
            <span>17:43</span>
        </div>
        <div class="status-bar__Column">
            <span>100%</span>
            <i class="fas fa-battery-three-quarters"></i>
            <i class="fas fa-bolt"></i>
        </div>
    </div>
    <header class="Welcome-header">
        <h1 class="Welcome-header__title">Welcom to KoKoa Clone</h1>
        <p class="Welcome-header__text">If you have a Kokoa Clone, log in with your email or phone number.</p>
    </header>
    <form id="login-form" action="friends.html">
        <input type="text" placeholder="Email or phone number">
        <input type="password" placeholder="Password">
        <input type="submit" value="Log In" action>
        <!-- <input type="submit" value="Sign Up"> -->
        <!-- Sign Up을 넣으려면 form 이 하나 더 있어야함 -->
        <a href="#">Find Kokoa Clone Accont or Password</a>
    </form>

    <script src="https://kit.fontawesome.com/6478f529f2.js"
    crossorigin="anonymous"></script>

</html>
