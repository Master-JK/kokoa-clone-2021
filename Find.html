<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Find</title>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__Column">
            <span>No service</span>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="status-bar__Column">
            <span>17:43</span>
        </div>
        <div class="status-bar__Column">
            <span>100%</span>
            <i class="fas fa-battery-three-quarters"></i>
            <i class="fas fa-bolt"></i>
        </div>
    </div>
    <div class="Main-Setting">
        <span class="Main-Setting__title">Find</span>
        <div class="Main-Setting__icon">
            <i class="fas fa-search fa-lg"></i>
            <a href="Setting.html"><i class="fas fa-cog fa-lg"></i></a>
        </div>
    </div>

    <div class="item">
        <div class="item__columns">
            <i class="fas fa-qrcode fa-2x"></i>
            <span>QR Code</span>
        </div>
        <div class="item__columns">
            <i class="far fa-address-book fa-2x"></i>
            <span>Add by Contacts</span>
        </div>
        <div class="item__columns">
            <i class="fas fa-fingerprint fa-2x"></i>
            <span>Add by ID</span>
        </div>
        <div class="item__columns">
            <i class="far fa-envelope fa-2x"></i>
            <span>Invite</span>
        </div>
    </div>
    <div class="Recommend">
        <header>Recommned Friends</header>
        <div>You Have no friendsㅠㅠ</div>
    </div>
    <div class="Open_chat">
        <header>
            <span>Open Chat</span>
            <div>
                <span>Go to Openchat Home</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </header>
        <div class="Open_chat__contents">
            <div class="Open_chat__contents__text">
                <span>#BTS</span>
                <span>#BTS#AMRMY#NOP</span>
                <div class="Open_chat__contents__text_div">
                    <span>802 members</span>
                    <div></div>
                    <span>Active</span>
                </div>
            </div>
            <div class="Open_chat__contents__photo">
                <img src="kcm.jpg">
                <div class="Open_chat__contents__photo__like">
                    <i class="fas fa-heart"></i>
                    <span>382</span>
                </div>
            </div>
        </div>
    </div>



    <nav class="Navigation">
        <div class="Navigation__columns">
            <a href="friends.html"><i class="fas fa-user fa-2x"></i></a>
        </div>
        <div class="Navigation__columns">
            <a href="Chats.html"><i class="far fa-comment fa-2x"></i></a>
            <span>1</span>
        </div>
        <div class="Navigation__columns">
            <a href="Find.html"><i class="fas fa-search fa-lg fa-2x"></i></a>
        </div>
        <div class="Navigation__columns">
            <a href="More.html"><i class="fas fa-ellipsis-h fa-2x"></i></a>
            <span></span>
        </div>
    </nav>  



    <script src="https://kit.fontawesome.com/6478f529f2.js"
    crossorigin="anonymous"></script>
</body>
</html>
